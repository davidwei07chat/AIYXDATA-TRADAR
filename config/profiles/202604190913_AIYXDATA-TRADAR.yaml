  "frequency": "# ═══════════════════════════════════════════════════════════════\n#                    TrendRadar 频率词配置文件\n#                         Version: 1.1.0\n# ═══════════════════════════════════════════════════════════════\n\n# 可视化配置编辑器地址: https://AIYXDATA.github.io/TrendRadar/\n#\n# 凡是左侧有 # 的都是仅供阅读的说明性文字\n#\n# 这个文件用来设置你想关注的新闻关键词。\n# 系统会自动抓取包含这些关键词的热榜新闻推送给你。\n#\n# 文件分为两个区域：\n#   [GLOBAL_FILTER]  - 全局过滤区：排除不想看的内容\n#   [WORD_GROUPS]    - 词组定义区：设置想关注的关键词\n#\n# ═══════════════════════════════════════════════════════════════\n\n\n# ───────────────────────────────────────────────────────────────\n#                        全局过滤区\n# ───────────────────────────────────────────────────────────────\n# 在这里写入你不想看到的词，每行一个。\n# 包含这些词的新闻会被自动排除，不会出现在推送中。\n#\n# 使用方法：\n#   震惊              直接写词，包含\"震惊\"的新闻会被过滤\n#   /赌博|博彩/       用 /.../ 包裹可以匹配多个词（用 | 分隔）\n\n[GLOBAL_FILTER]\n# 过滤标题党\n\n\n\n# ───────────────────────────────────────────────────────────────\n#                        词组定义区\n# ───────────────────────────────────────────────────────────────\n# 在这里写入你想关注的关键词。\n# 每个词组用空行分隔，同一词组内的关键词是\"或\"的关系。\n#\n# ┌─────────────────────────────────────────────────────────────┐\n# │                      语法总览（快速参考）                      │\n# └─────────────────────────────────────────────────────────────┘\n#\n# 关键词语法：\n#   关键词            普通关键词，标题包含即匹配\n#   /正则/            正则表达式匹配（自动忽略大小写）\n#   关键词 => 别名    给关键词指定显示别名\n#   [组别名]          词组第一行，给整组指定别名\n#   +关键词           必须词，所有必须词都要匹配才算匹配\n#   !关键词           过滤词，匹配则排除该条新闻（仅限当前词组）\n#   @数字             限制该词组最多显示多少条\n#\n# 显示名称优先级：\n#   1. 有组别名 → 显示组别名\n#   2. 没有组别名 → 显示各行别名拼接（用 \" / \" 连接）\n#   3. 没有别名 → 显示关键词本身\n#\n#\n# ┌─────────────────────────────────────────────────────────────┐\n# │                      基础用法（推荐新手）                      │\n# └─────────────────────────────────────────────────────────────┘\n#\n# 1. 最简单：直接写关键词\n#    ────────────────────\n#    华为\n#\n#    效果：匹配所有包含\"华为\"的新闻\n#\n#\n# 2. 多个关键词归为一组\n#    ────────────────────\n#    华为\n#    鸿蒙\n#    任正非\n#\n#    效果：匹配包含\"华为\"或\"鸿蒙\"或\"任正非\"的新闻，统一显示为\"华为 / 鸿蒙 / 任正非\"\n#\n#\n# 3. 给词组起个名字（推荐）\n#    ────────────────────\n#    [华为]\n#    华为\n#    鸿蒙\n#    任正非\n#\n#    效果：同上，但显示名称为\"华为\"（更简洁）\n#\n#\n# ┌─────────────────────────────────────────────────────────────┐\n# │                      进阶用法（可选）                         │\n# └─────────────────────────────────────────────────────────────┘\n#\n# 4. 用正则表达式匹配多个词（一行搞定）\n#    ────────────────────\n#    /华为|鸿蒙|任正非/ => 华为\n#\n#    效果：匹配包含\"华为\"或\"鸿蒙\"或\"任正非\"的新闻，显示为\"华为\"\n#    说明：/.../ 里用 | 分隔多个词，=> 后面是显示名称\n#\n#    💡 不懂正则？问 AI：\n#       \"帮我写一个正则表达式，匹配包含'华为'或'鸿蒙'或'任正非'的文本，\n#        格式要求：/正则/ => 显示名称\"\n#\n#\n# 5. 精确匹配英文单词（避免误匹配）\n#    ────────────────────\n#    /\\bAI\\b/i => AI\n#\n#    说明：\\b 表示单词边界，避免匹配到 \"MAIL\" 中的 \"AI\"\n#          /i 表示忽略大小写，\"ai\"、\"AI\"、\"Ai\" 都能匹配\n#\n#    💡 不懂正则？问 AI：\n#       \"帮我写一个正则表达式，精确匹配英文单词'AI'（不匹配 MAIL 中的 AI），\n#        忽略大小写，格式要求：/正则/i => 显示名称\"\n#\n#\n# 6. 排除特定内容\n#    ────────────────────\n#    [苹果公司]\n#    苹果\n#    !水果\n#    !果园\n#\n#    效果：匹配\"苹果\"但排除包含\"水果\"或\"果园\"的新闻\n#    说明：! 开头的词表示\"排除\"\n#\n#\n# 7. 限制显示条数\n#    ────────────────────\n#    [科技新闻]\n#    科技\n#    @5\n#\n#    效果：最多显示 5 条匹配的新闻\n#    说明：@数字 表示限制条数\n#\n#\n# 8. 必须同时包含多个词\n#    ────────────────────\n#    +苹果\n#    +发布会\n#\n#    效果：必须同时包含\"苹果\"和\"发布会\"才匹配\n#    说明：+ 开头的词表示\"必须包含\"\n#\n# ───────────────────────────────────────────────────────────────\n\n震惊\n\n[WORD_GROUPS]\n\n[上海活动打卡]\n/上海|魔都|外滩|陆家嘴|新天地|太古里|大悦城|嘉里|恒隆|K11|TX淮海|现所|上生新所|蟠龙|鸿寿坊|千树|西岸|豫园|武康路|安福路|愚园路|快闪|市集|展览|首展|首店|打卡|漫游|艺术季|电影节|咖啡节|嘉年华|\\bPop-up\\b|\\bExhibition\\b|\\bMarket\\b/\n\n[上海本地生活]\n/上海|魔都|随申|申通|强生|锦江|外滩|陆家嘴|迪士尼|东方明珠|豫园|城隍庙|南京路|淮海路|武康路|愚园路|浦东|徐汇|静安|黄浦|虹口|杨浦|长宁|普陀|宝山|嘉定|闵行|松江|青浦|奉贤|金山|崇明|沪牌|拍牌|申花|久事|警民直通车|大众交通|小红书|B站|600834|600662|600611|600637|600650|\\bShanghai\\b|\\bDisney\\b/\n\n# ═══════════════════════════════════════════════════════════════\n#                         企业与品牌\n# ═══════════════════════════════════════════════