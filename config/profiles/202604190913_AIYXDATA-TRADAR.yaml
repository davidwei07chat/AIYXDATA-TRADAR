  "timeline": "# ═══════════════════════════════════════════════════════════════\n#                   TrendRadar 时间线配置\n#                      Version: 1.0.0\n# ═══════════════════════════════════════════════════════════════\n#\n# 这个文件控制「什么时间做什么事」。\n#\n# 大多数人不需要编辑这个文件。\n# 只需在 config.yaml 中选择一个预设模板即可：\n#\n#   schedule:\n#     preset: \"morning_evening\"    ← 改这里就行\n#\n#\n# 可视化配置编辑器地址: https://AIYXDATA.github.io/TrendRadar/\n#\n#\n# ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─\n# 📖 基本概念（帮助你理解后面的配置）\n# ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─\n#\n#\n# 🔁 程序是怎么运行的？\n#\n#   TrendRadar 不是一直在后台运行的，而是被「定时闹钟」周期性唤醒：\n#\n#     GitHub Actions 用户 → 由 .github/workflows/crawler.yml 中的 cron 定时触发\n#                           默认每小时运行一次（如每小时第 33 分钟）\n#\n#     Docker 用户         → 由 docker/.env 中的 CRON_SCHEDULE 定时触发\n#                           默认每 30 分钟运行一次\n#\n#   每次被唤醒后，程序按以下三个阶段依次执行：\n#\n#     1️⃣ 采集（collect）\n#        爬取各热榜平台 + RSS 订阅源的最新数据，存入数据库\n#\n#                  ⬇\n#\n#     2️⃣ 分析（analyze）\n#        调用 AI 大模型对采集到的新闻进行深度分析（可选，需配置 API Key）\n#\n#                  ⬇\n#\n#     3️⃣ 推送（push）\n#        将整理好的热点新闻 + AI 分析结果发送到你的通知渠道\n#        （飞书、钉钉、Telegram、邮件等）\n#\n#   这三个阶段都可以独立开关。本文件的作用就是控制：\n#   「在什么时间段，开启/关闭哪些阶段」。\n#\n#\n# 🔌 config.yaml 总开关 与 timeline 时间段开关 的关系\n#\n#   config.yaml 里有几个「总开关」，它们的优先级高于本文件：\n#\n#     platforms.enabled: false   → 永远不爬热榜（无论 timeline 怎么设置）\n#     rss.enabled: false         → 永远不爬 RSS（同上）\n#     notification.enabled: false → 永远不推送（同上）\n#     ai_analysis.enabled: false  → 永远不分析（同上）\n#\n#   只有当总开关为 true 时，timeline 的时间段开关才会生效。\n#   换句话说：总开关决定「能不能做」，timeline 决定「什么时候做」。\n#\n#\n# ⏰ 什么是「时间段」和「静默期」？\n#\n#   你可以把一天想象成一条时间线，上面划分了若干个「时间段」。\n#   每个时间段有自己的行为开关（是否采集、是否分析、是否推送）。\n#\n#   而不在任何时间段内的时间，就叫「静默期」（走 default 默认配置）。\n#   静默期通常必须要采集，这样数据一直在积累，\n#   等到推送时，就能汇总出完整的报告。\n#\n#\n#   💡 静默期越长，积累的数据越丰富（排名变化轨迹、上榜/下榜时间等），\n#   最终提交给 AI 分析的上下文也越完整，分析质量更高。\n#   相比 MCP Server，该方案的全天数据能呈现更完整的热度趋势和变化脉络。\n#\n#\n# ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─\n# 📋 预设模板一览（选一个就行）\n# ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─\n#\n#   1️⃣ always_on        全天候，有新增就推（默认）\n#   2️⃣ morning_evening  全天推送 + 晚间汇总（推荐大多数人）\n#   3️⃣ office_hours     工作日三段式：到岗速览→午间热点→收工汇总\n#   4️⃣ night_owl        午后速览 + 深夜全天汇总\n#   5️⃣ custom           完全自定义（需要编辑本文件底部的 custom 段）\n#\n# 想自定义？两种方式：\n#   1. 直接翻到本文件底部的「自定义模式」部分\n#   2. 在下方 presets 里新增你自己的预设模板\n#      （只要 key 不重复，然后在 config.yaml 里填你的模板名即可）\n#\n# ⚠️ 关于时间段设计的建议：\n#   GitHub Actions： 建议定时任务间隔 ≥ 2 小时。由于系统触发存在随机延迟，间隔过短可能导致任务漏运行。\n#   Docker 用户：cron 定时是准时的，无此限制，按需设置即可。\n#\n#\n# ═══════════════════════════════════════════════════════════════\n\n\n# ───────────────────────────────────────────────────────────────\n# 预设模板\n# ───────────────────────────────────────────────────────────────\npresets:\n\n  # ───────────────────────────────────────────────────────────\n  # 1️⃣ always_on - 全天候监控\n  #\n  # 最简单的模式：全天候采集 + 推送，有新增就通知你。\n  # 不划分时间段，全天使用同一套配置。\n  # 适合：重度用户、实时舆情监控\n  #\n  # 全天：推送 ✓ | AI分析 ✗ | 不限推送次数\n  # ───────────────────────────────────────────────────────────\n  always_on:\n    name: \"全天监控\"\n    description: \"全天候监控，有新增立即推送。适合重度用户。\"\n\n    # 默认配置 ── 不在任何时间段内时，使用这组开关\n    # 因为这个模式没有划分时间段，所以 default 就是全天的行为\n    default:\n      collect: true                # 采集数据（爬取热榜 + RSS）\n      analyze: false               # 不做 AI 分析（节省 API 费用）\n      ai_mode: \"current\"           # AI 分析当前榜单\n      push: true                   # 有新内容就推送\n      report_mode: \"incremental\"   # 只推送新增内容，避免重复\n      once:                        # 限制每个时间段内只执行一次\n        analyze: false             #   不限制分析次数\n        push: false                #   不限制推送次数\n\n    # 没有定义任何时间段，全天都走 default\n    #\n    # 语法提示：{} 是 YAML 的「空字典」写法，表示里面没有任何内容。\n    # 等价于写成多行但什么都不填。后面的 [] 同理，表示「空列表」。\n    periods: {}\n    day_plans:\n      all_day:\n        periods: []                   # 空列表 = 这天不启用任何时间段\n    week_map:\n      1: \"all_day\"                 # 周一\n      2: \"all_day\"                 # 周二\n      3: \"all_day\"                 # 周三\n      4: \"all_day\"                 # 周四\n      5: \"all_day\"                 # 周五\n      6: \"all_day\"                 # 周六\n      7: \"all_day\"                 # 周日\n\n\n  # ───────────────────────────────────────────────────────────\n  # 2️⃣ morning_evening - 早晚汇总（推荐）\n  #\n  # 全天推送当前热点 + 晚间做一次当日全天汇总。\n  # 适合：大多数人\n  #\n  # 默认（全天）：推送 ✓ | AI分析 ✓ | 不限推送次数\n  # 晚间汇总：推送 ✓ | AI分析 ✓ | 只推/分析一次\n  # ───────────────────────────────────────────────────────────\n  morning_evening:\n    name: \"早晚汇总\"\n    description: \"全天推送 + 晚间当日汇总。适合大多数人。\"\n\n    # 默认配置 ── 不命中任何时间段时的行为\n    default:\n      collect: true                # 始终采集\n      analyze: true                # AI 分析当前榜单\n      ai_mode: \"current\"           # AI 分析当前榜单\n      push: true                   # 每次推送当前在榜热点\n      report_mode: \"current\"       # 当前在榜的新闻\n      once:\n        analyze: true             # 不限制分析次数\n        push: false                # 不限制推送次数\n\n    # 时间段定义 ── 只有晚间汇总需要特殊处理\n    periods:\n      evening_summary:\n        name: \"晚间汇总\"\n        start: \"22:30\"\n        end: \"23:00\"\n        analyze: true              # 晚间做 AI 分析\n        ai_mode: \"daily\"           # AI 也汇总全天内容\n        report_mode: \"daily\"       # 切换为当日全部新闻汇总\n        once:\n          analyze: true            # 窗口内只分析一次\n          push: true               # 窗口内只推送一次\n\n    # 日计划 ── 把时间段组装成一天的安排\n      morning:\n        name: \"早上推送\"\n        start: \"08:35\"\n        end: \"08:45\"\n        collect: true\n        analyze: false\n        push: true\n        report_mode: current\n      noonpush:\n        name: \"中午推送\"\n        start: \"12:30\"\n        end: \"13:30\"\n        collect: true\n        analyze: false\n        push: true\n        report_mode: current\n      afternoonpush:\n        name: \"下午推送\"\n        start: \"16:00\"\n        end: \"17:00\"\n        collect: true\n        analyze: false\n        push: true\n        report_mode: current\n    day_plans:\n      all_day:\n        periods: [\"evening_summary\"]\n\n    # 周映射 ── 每天用哪个日计划（1=周一 ... 7=周日）\n    week_map:\n      1: \"all_day\"\n      2: \"all_day\"\n      3: \"all_day\"\n      4: \"all_day\"\n      5: \"all_day\"\n      6: \"all_day\"\n      7: \"all_day\"\n\n\n  # ───────────────────────────────────────────────────────────\n  # 3️⃣ office_hours - 办公时间推送\n  #\n  # 工作日三段式推送，周末增量自由推。\n  # 适合：上班族、企业用户\n  #\n  # 默认（静默期）：推送 ✗ | AI分析 ✗\n  # 到岗速览：推送 ✓ | AI分析 ✓ | 只推一次\n  # 午间热点：推送 ✓ | AI分析 ✗ | 只推一次\n  # 收工汇总：推送 ✓ | AI分析 ✓ | 只推一次\n  # 周末自由：推送 ✓ | AI分析 ✗ | 不限推送次数\n  # ───────────────────────────────────────────────────────────\n  office_hours:\n    name: \"办公时间\"\n    description: \"工作日三段式推送（到岗→午间→收工），周末增量自由推送。\"\n\n    default:\n      collect: true\n      analyze: false\n      ai_mode: \"current\"\n      push: false                  # 默认不推送\n      report_mode: \"current\"\n      once:\n        analyze: true              # 每个时段只分析一次\n        push: true                 # 每个时段只推送一次\n\n    periods:\n      morning_briefing:\n        name: \"到岗速览\"\n        start: \"09:00\"\n        end: \"11:00\"\n        analyze: true              # AI 分析当前热点\n        ai_mode: \"current\"         # AI 分析当前榜单\n        push: true                 # 到岗后看当前热点\n        report_mode: \"current\"     # 当前在榜的新闻\n        # once 继承 default（analyze: true, push: true）→ 只推/分析一次\n\n      noon_update:\n        name: \"午间热点\"\n        start: \"13:00\"\n        end: \"15:00\"              \n        push: true                 # 午间推送当前在榜热点\n        report_mode: \"current\"     # 当前在榜的新闻\n        # analyze 继承 default: false → 午间不做 AI 分析，节省 API\n        # once 继承 default（push: true）→ 只推一次\n\n      closing_summary:\n        name: \"收工汇总\"\n        start: \"17:00\"\n        end: \"19:00\"\n        analyze: true              # AI 做全天汇总分析\n        ai_mode: \"daily\"           # AI 也分析全天内容\n        push: true                 # 下班前推送当日完整汇总\n        report_mode: \"daily\"       # 当日全部新闻汇总\n        # once 继承 default（analyze: true, push: true）→ 只推/分析一次\n\n      weekend_free:\n        name: \"周末自由\"\n        start: \"08:00\"\n        end: \"23:00\"\n        ai_mode: \"current\"         # AI 分析当前榜单\n        push: true                 # 有新增就推送\n        report_mode: \"incremental\" # 增量模式：有新增才推，没有就安静\n        once:\n          analyze: false           # 不限制分析次数\n          push: false              # 不限制推送次数\n\n    # 工作日使用三段式推送；周末使用增量自由模式\n    day_plans:\n      workday:\n        periods: [\"morning_briefing\", \"noon_update\", \"closing_summary\"]\n      weekend:\n        periods: [\"weekend_free\"]  # 周末：有新增就推，不打扰睡眠\n\n    week_map:\n      1: \"workday\"                 # 周一 → 工作日计划\n      2: \"workday\"\n      3: \"workday\"\n      4: \"workday\"\n      5: \"workday\"\n      6: \"weekend\"                 # 周六 → 周末计划\n      7: \"weekend\"                 # 周日 → 周末计划\n\n\n  # ───────────────────────────────────────────────────────────\n  # 4️⃣ night_owl - 夜猫子模式\n  #\n  # 白天安静，午后和深夜各推一次。\n  # 适合：夜间工作者、海外时差用户、自由职业者\n  #\n  # 默认（白天静默）：推送 ✗ | AI分析 ✗\n  # 午后速览：推送 ✓ | AI分析 ✓ | 只推一次\n  # 深夜汇总：推送 ✓ | AI分析 ✓ | 只推一次\n  # ───────────────────────────────────────────────────────────\n  night_owl:\n    name: \"夜猫子模式\"\n    description: \"午后速览 + 深夜全天汇总。适合夜间工作者、海外时差用户。\"\n\n    default:\n      collect: true\n      analyze: false\n      ai_mode: \"current\"\n      push: false\n      report_mode: \"current\"\n      once:\n        analyze: true              # 每个时段只分析一次\n        push: true                 # 每个时段只推送一次\n\n    periods:\n      afternoon_peek:\n        name: \"午后速览\"\n        start: \"15:00\"\n        end: \"17:00\"\n        analyze: true              # AI 分析当前热点\n        ai_mode: \"current\"         # AI 分析当前榜单\n        push: true                 # 午后看当前热点\n        report_mode: \"current\"     # 当前在榜的新闻\n        # once 继承 default（analyze: true, push: true）→ 只推/分析一次\n\n      late_night:\n        name: \"深夜汇总\"\n        start: \"22:00\"\n        end: \"01:00\"               # start > end → 自动识别为跨日\n        analyze: true              # AI 做全天汇总分析\n        ai_mode: \"daily\"           # AI 也分析全天内容\n        push: true                 # 深夜推送当日完整汇总\n        report_mode: \"daily\"       # 当日全部新闻汇总\n        # once 继承 default（analyze: true, push: true）→ 只推/分析一次\n\n    day_plans:\n      all_day:\n        periods: [\"afternoon_peek\", \"late_night\"]\n    week_map:\n      1: \"all_day\"\n      2: \"all_day\"\n      3: \"all_day\"\n      4: \"all_day\"\n      5: \"all_day\"\n      6: \"all_day\"\n      7: \"all_day\"\n\n\n# ═══════════════════════════════════════════════════════════════\n#\n# 5️⃣ 自定义模式\n#\n# 当 config.yaml 中设置 schedule.preset: \"custom\" 时，\n# 系统会读取下面这段配置。\n#\n# 如果上面的预设模板无法满足你的需求，可以在这里自由定义。\n#\n# ═══════════════════════════════════════════════════════════════\n#\n# 自定义配置的思路很简单，就像搭积木：\n#\n#   第 1 步：定义「积木块」（periods）\n#            每块积木 = 一个时间段 + 这段时间要做什么\n#            例如：早间 08-10 推送、晚间 19-21 汇总\n#\n#   第 2 步：拼成「一天的安排」（day_plans）\n#            把积木块组合起来，形成一天的日程\n#            例如：工作日用 [早间, 晚间]，周末用 [晚间]\n#\n#   第 3 步：指定「每天用哪个安排」（week_map）\n#            周一到周日，分别对应哪个日计划\n#            例如：周一~周五用 workday，周六周日用 weekend\n#\n#   另外还有一个「默认配置」（default），\n#   当某个时刻不在任何积木块内时，就用默认配置。\n#   积木块里没写的字段，也会自动回退到默认配置。\n#\n#\n# 下面是一个完整的自定义示例，工作日和周末使用不同的时间段安排：\n#\n#   工作日时间段:\n#     深夜静默 23:00-06:00（跨日）：采集 ✓ | 分析 ✓ | 推送 ✗\n#     工作日早间 08:00-10:00：推送 ✓ | incremental\n#     晚间汇总 19:00-21:00：推送 ✓ | 分析 ✓ | daily\n#     其余时间走默认配置（静默采集）\n#\n#   周末时间段:\n#     深夜静默 23:00-06:00（跨日）：采集 ✓ | 分析 ✓ | 推送 ✗\n#     周末早间 10:00-12:00：推送 ✓ | daily\n#     晚间汇总 19:00-21:00：推送 ✓ | 分析 ✓ | daily\n#     其余时间走默认配置（静默采集）\n\ncustom:\n  name: \"自定义\"\n  description: \"完全自由定义时间段、日计划和周映射。\"\n\n  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n  # 默认配置\n  #\n  # 当前时刻不在任何时间段（积木块）内时，使用这组开关。\n  # 时间段中没有写的字段，也会回退到这里。\n  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n  default:\n    collect: true                  # 是否采集数据（爬取热榜 + RSS）\n    analyze: true                 # 是否执行 AI 分析\n    ai_mode: \"current\"            # AI 分析模式:\n                                   #   follow_report → 跟随 report_mode\n                                   #   daily         → 强制全天汇总\n                                   #   current       → 强制当前榜单\n                                   #   incremental   → 强制增量模式\n    push: true                    # 是否发送推送通知\n    report_mode: \"current\"         # 报告模式:\n                                   #   daily       → 当日所有新闻的汇总\n                                   #   current     → 当前在榜的新闻\n                                   #   incremental → 只推送新增内容\n    once:\n      analyze: true                # 该时间段内只分析一次（省 API）\n      push: true                   # 该时间段内只推送一次（省打扰）\n\n\n  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n  # 第 1 步：定义积木块（时间段）\n  #\n  # 每个时间段有一个唯一的 key（如 deep_quiet），\n  # 以及 start / end 表示生效的时间范围。\n  #\n  # 只需要写「和 default 不同的字段」，其余自动继承 default。\n  # 例如 weekday_morning 没写 collect，就会继承 default 的 collect: true。\n  #\n  # 提示：如果 start > end（如 22:00 → 07:00），\n  #       系统会自动识别为跨越午夜的时间段。\n  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n  periods:\n\n    deep_quiet:\n      name: \"深夜静默\"\n      start: \"23:00\"\n      end: \"06:00\"                 # 23:00 → 次日 06:00（跨日时间段）\n      collect: true                # 夜间继续采集数据\n      analyze: true                # 夜间可以跑 AI 分析（反正不推送）\n      push: false                  # 深夜不推送，避免打扰\n\n    weekday_morning:\n      name: \"工作日早间\"\n      start: \"08:00\"\n      end: \"10:00\"                 # 跨度 2h，留足触发裕量\n      push: true                   # 早上推送一次\n      report_mode: \"incremental\"   # 只推新增内容\n      # once 继承 default（push: true）→ 窗口内只推一次\n\n    weekend_morning:\n      name: \"周末早间\"\n      start: \"10:00\"\n      end: \"12:00\"                 # 跨度 2h\n      push: true\n      report_mode: \"daily\"         # 周末看全天汇总\n      # once 继承 default（push: true）→ 窗口内只推一次\n\n    evening_summary:\n      name: \"晚间汇总\"\n      start: \"19:00\"\n      end: \"21:00\"\n      analyze: true                # 晚间做 AI 分析\n      ai_mode: \"daily\"             # AI 也分析全天内容\n      push: true                   # 晚间推送\n      report_mode: \"daily\"         # 当日全部新闻汇总\n      # once 继承 default（analyze: true, push: true）→ 只分析/推送一次\n\n\n  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n  # 第 2 步：把积木块拼成日计划\n  #\n  # 把上面定义的时间段组合成一天的安排。\n  # 你可以定义多个日计划（如 workday 和 weekend），\n  # 然后在第 3 步的 week_map 中分配给不同的星期。\n  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n  day_plans:\n    workday:                       # 工作日计划\n      periods: [\"deep_quiet\", \"weekday_morning\", \"evening_summary\"]\n    weekend:                       # 周末计划（用 weekend_morning 替换 weekday_morning）\n      periods: [\"deep_quiet\", \"weekend_morning\", \"evening_summary\"]\n\n\n  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n  # 第 3 步：指定每天用哪个日计划\n  #\n  # 1=周一  2=周二  3=周三  4=周四  5=周五  6=周六  7=周日\n  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n  week_map:\n    1: \"workday\"                   # 周一 → 工作日计划\n    2: \"workday\"                   # 周二\n    3: \"workday\"                   # 周三\n    4: \"workday\"                   # 周四\n    5: \"workday\"                   # 周五\n    6: \"weekend\"                   # 周六 → 周末计划\n    7: \"weekend\"                   # 周日\n\n\n  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n  # 冲突策略（一般不用改）\n  #\n  # 什么是「冲突」？\n  #   如果你的两个时间段有重叠（比如 A 是 08:00-12:00，B 是 10:00-14:00），\n  #   那么 10:00-12:00 这段时间就同时属于 A 和 B，产生了冲突。\n  #   此时程序需要知道：到底听谁的？\n  #\n  # 两种处理方式：\n  #\n  #   error_on_overlap（推荐）\n  #     直接报错，提醒你去修改配置。\n  #     适合大多数人 —— 时间段重叠通常是写错了，报错能及时发现。\n  #\n  #   last_wins\n  #     day_plans 的 periods 列表中，写在后面的优先。\n  #     比如 periods: [\"A\", \"B\"]，重叠时 B 生效。\n  #     适合场景：你想用一个大范围时间段打底，再用后面的小范围覆盖。\n  #\n  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n  overlap:\n    policy: \"error_on_overlap\"\n",
  "analysis_prompt": "# ═══════════════════════════════════════════════════════════════\n#                    TrendRadar AI 分析提示词配置\n#                      Version: 2.0.0\n# ═══════════════════════════════════════════════════════════════\n#\n# 此文件定义 AI 分析热点新闻时使用的提示词模板\n#\n# 可用变量（在分析时会被替换）：\n#   {language}            - 输出语言 (由 ai_analysis.language 配置)\n#   {report_mode}         - 当前报告模式\n#   {report_type}         - 报告类型描述\n#   {current_time}        - 当前时间\n#   {news_count}          - 热榜新闻条数\n#   {rss_count}           - RSS 新闻条数\n#   {keywords}            - 匹配的关键词列表\n#   {platforms}           - 数据来源平台列表\n#   {news_content}        - 热榜新闻内容\n#   {rss_content}         - RSS 订阅内容 (需开启 ai_analysis.include_rss)\n#   {standalone_content}  - 独立展示区数据 (需开启 ai_analysis.include_standalone)\n#\n# ═══════════════════════════════════════════════════════════════\n\n[system]\nRole: 高级情报分析师\nProfile\nlanguage: 中文\ndescription: 你是一名精通公开来源情报（OSINT）分析的高级专家。你的核心能力是从海量、碎片化的网络信息中，提炼出底层逻辑链条，精准识别被主流舆论忽略的关键弱信号，并基于多平台数据和专业洞察，提供前瞻性的趋势研判与策略建议，确保数字类分析的绝对准确性。\nbackground: 拥有情报分析、数据科学和舆论动力学等多学科背景，长期服务于高端决策支持场景。你的分析模型融合了信号检测、交叉验证和反直觉思考，旨在穿透信息迷雾，揭示真实动向。\npersonality: 极度冷静、客观、理性，具有强烈的批判性思维和好奇心。善于在共识中寻找异见，在喧嚣中捕捉寂静。语言风格简洁犀利，直戳本质，拒绝任何浮夸与情感渲染。\nexpertise: OSINT信息挖掘与整合、多平台舆论态势分析、弱信号识别、趋势推演与风险评估、结构化逻辑输出、区域与类别分析（具体要求见Rules）。\ntarget_audience: 企业战略决策者、风险投资与对冲基金分析师、品牌与公关策略负责人、政策研究与安全情报机构人员。\nSkills\n核心分析技能\n\n信号探测与模式识别：能够从低排名、长尾内容中精准识别潜在关联与早期信号，精确解读数据轨迹（急升、衰退、回榜）背后的含义，特别关注趋势变化，有效识别重点模式。\n交叉验证与平台分析：熟练运用“热榜”（大众情绪）与“RSS/专业源”（专家视角）的温差进行交叉验证，结合各平台（微博、知乎、B站等）的固有调性进行深度解读，确保数字类数据的准确对比。\n反直觉逻辑推演：当舆论形成单边共识时，能够主动寻找反方证据或潜在风险，发掘认知套利的机会。\n结构化输出（MECE）：确保分析维度相互独立且完全穷尽，构建逻辑严密、无懈可击的分析框架，输出结构清晰。 辅助与执行技能\n信息去重与优先级排序：能快速过滤噪声，从冗余信息中锁定核心叙事与独家增量，锁定关键信息。\n数据字段深度解读：严格遵守对来源平台、排名、出现次数、时间范围及轨迹数据的量化分析规则，确保数字类分析的准确性，准确解读关键指标，避免任何误读。此分析必须严格遵循下方【数据字段深度解读指南】中的所有定义和规则。\n深度研判与策略推演：不仅复盘事件，更能准确预测下一阶段发展，并为不同角色提供具体、可操作的行动指南，特别强调趋势变化的洞察，具体要求见Rules。\n严格格式化输出：确保最终报告完全遵循指定的纯JSON结构、板块划分和文本规范，无任何格式错误。 Rules 基本原则：\n直击要害与逻辑闭环：拒绝使用“综上所述”等冗余表述。所有结论必须直接、明确，并形成“发生了什么-为什么发生-未来会怎样”的完整逻辑闭环。\n去情绪化与客观冷静：可以分析和描述舆论的情绪，但自身分析必须剥离情感，基于事实和数据，进行冷血、客观的评估。\n辩证思维与抓住主要矛盾：在分析任何热点时，必须识别其背后的核心驱动力量（如技术变革vs.既得利益、情绪传播vs.事实逻辑），抓住事物发展的主要矛盾。\n精准与清晰：所有分析必须精准无误，输出准确，直接抓住问题核心，准确传达趋势变化，对数字数据进行严格交叉验证，确保绝对准确。\n分版块分区域分析维度：在分析过程中，将数据按【中国】、【海外】、【AI科技】、【上海本地】、【其他】这五个分析维度进行归类和洞察。分析报告的所有章节（core_trends, sentiment_controversy, signals, rss_insights, outlook_strategy, standalone_summaries）都必须据此组织内容，段落以【区域/类别】标签开头。输出格式必须严格遵守Output Format Template中的规范。请注意，区域段落仅当输入数据中存在相关维度信息时才需生成，避免为不存在数据的维度输出空洞内容。\n行为准则：\n\n跨平台与轨迹分析强制进行：在 signals 等板块的分析中，禁止仅罗列单点信息，必须结合跨平台共振、平台温差或数据轨迹的突变进行论证，展示趋势变化。轨迹分析必须严格依据【数据字段深度解读指南】中的量化规则。\n独立展示区去重补盲：处理 standalone_summaries 时，优先总结前五大板块未覆盖的独有内容或独特走势，避免简单重复，确保捕捉关键增量。\n限制条件：\n\n禁止输出无意义的正确废话：在 outlook_strategy 等需要建议的部分，严禁使用“建议持续关注”等空泛表述，必须给出具体、有针对性的行动指南。\n防幻觉数据解读：必须严格区分“热度高”（高位横盘）与“热度升”（排名数值减小）。对轨迹数据中的“0”（脱榜）有准确认知，确保数字类分析的准确性，防止对数据模式的错误描述。此条是【数据字段深度解读指南】中防幻觉警示的核心要求，必须严格遵守。 Output Format Template 前置强制性要求：输出格式必须是纯JSON对象。此为模型生成前必须遵守的最高优先级约束。\n\n格式要求：必须输出纯JSON字符串格式的对象。\n\n结构定义：JSON对象必须包含以下六个键：“core_trends”, “sentiment_controversy”, “signals”, “rss_insights”, “outlook_strategy”, “standalone_summaries”。\n\n内容规范：所有文本内容必须使用换行符 \\n 进行合理分段，严禁输出未经排版的长难段落。可以使用 Markdown 的列表符号（- 或 *）来增加条理性。\n\n分版块分区域标注：每个JSON字段的内容必须根据输入数据，按分析维度组织。段落必须以【区域/类别】标签开头（分析维度：【中国】、【海外】、【AI科技】、【上海本地】、【其他】），标签后紧跟该维度下的分析内容。示例：“core_trends”: “【中国】微博热搜显示…\\n【AI科技】Hacker News讨论…”（根据实际数据生成相应标签段落，无需覆盖全部五个标签）。\n\n模板遵从：模型必须严格按此结构生成报告，避免任何格式错误或结构偏差。\n数据字段深度解读指南\n\n基础维度 来源平台：每一行新闻开头的 [平台名称]（如 [微博]、[知乎]）明确指出了数据来源。请务必注意：后续的排名和轨迹数据仅针对该特定平台的榜单。 排名：“1”为该平台榜首，数字越小越热。“3-8”表示在该平台排名在第3到第8之间波动。 出现次数：次数越多，说明在热榜停留时间越长，热度越持久。 时间范围：如“09:30~12:45”，跨度越大说明话题生命力越强。\n轨迹量化分析（重要） 数据格式为 排名(时间)→排名(时间)…，例如 1(09:30)→0(10:00)→2(10:30)。\n关键定义：\n数值含义：数字代表排名（1为榜首，数字越小越靠前）。0 特指“未上榜”或“脱榜”（即该时间点不在榜单中）。\n符号含义：→ 代表时间推移。\n防幻觉警示（关键）：\n高位横盘 ≠ 急升：如果轨迹是 2(10:00)→2(10:30)→2(11:00)，说明热度持续稳定，绝对不是“急升”或“爆发”。只有排名数值显著减小（如 10→5）才是急升。请务必区分“热度高”和“热度升”。\n请重点分析以下模式：\n急升／爆发：排名数值在短时间内大幅减小（如 20→3），代表热度飙升，往往意味着突发重大事件。\n衰退／僵尸：排名数值持续变大且无反弹（如 10→15→20），代表热度正在自然衰退。\n回榜／反转：序列中出现 0 后又变为高排名（如 5→0→2），代表话题曾脱榜但因新进展“复活”，通常暗示有新爆料或剧情反转。\n3. 跨平台特征（分级标准）\n全网霸屏：5个及以上平台同时上榜。真正的“国民级”话题，无死角覆盖。\n破圈扩散：3-4个平台同时上榜。话题已突破单一社区壁垒，正在向外蔓延。\n圈层热点：仅在1-2个平台火爆。属于特定人群的狂欢。\n平台调性参考 (Platform DNA)：\n舆论／情绪场：微博（情绪／吃瓜）、抖音／快手（视觉／传播快）、B站（年轻／玩梗）\n理性／专业场：知乎（深度／批判）、雪球（投资／财经）、IT之家／36氪（科技／商业）\n资讯／分发场：今日头条（社会／民生）、百度热搜（综合／搜索量）\n分析“平台温差”时，请结合平台调性。例如：某话题在微博火但在知乎冷，可能说明该话题“情绪价值大于逻辑价值”或“缺乏深度讨论点”。\n\nWorkflows\n目标: 基于用户提供的热榜、RSS及独立展示区数据，生成一份深度、结构化、具有前瞻性的OSINT分析报告，确保精准、抓住核心，准确解读趋势变化。报告需根据数据情况融合分区域/类别的分析维度，具体要求见Rules。\n步骤 1: 深度解读输入数据。严格按照《数据字段深度解读指南》，理解每条数据的来源平台、排名意义、出现次数、时间跨度，并重点量化分析其排名轨迹（急升／衰退／回榜）中的趋势变化，确保数字类数据的准确解读，同时评估话题的跨平台覆盖特征（全网霸屏／破圈扩散／圈层热点）。为后续分版块分析做准备。\n步骤 2: 整合与提炼核心趋势（对应 core_trends）。从散点信息中寻找共性叙事或底层逻辑，用“宏观主线+微观佐证”的结构进行概括，抓住核心，并明确判定整体热度性质。需根据数据所涉及的维度进行分区域/类别分析。\n步骤 3: 绘制舆论光谱与识别争议（对应 sentiment_controversy）。分析不同群体（大众vs专家，平台A vs平台B）的情绪与观点差异，定位核心矛盾点是“利益之争”还是“认知之争”。融入数据相关的区域和类别维度。\n步骤 4: 捕捉多维异动与弱信号（对应 signals）。结合步骤1的分析，重点报告跨平台共振、平台温差、轨迹突变等异常模式，指出潜在的早期机会或风险点，确保精准识别。特别关注各区域和类别的信号差异。\n步骤 5: 挖掘专业信息增量（对应 rss_insights）。对比热榜与RSS内容，去重后提取热榜缺失的硬核细节、技术参数或前瞻性行业信号，实现认知纠偏或信息补全，特别关注数字类的准确性。分版块提取专业增量。\n步骤 6: 进行研判与策略输出（对应 outlook_strategy）。对事件后续发展进行推演，并分别为投资者、品牌方、公众等不同角色提供具体、差异化的行动建议，准确传达趋势变化。建议必须分版块考虑。\n步骤 7: 处理独立展示区数据（对应 standalone_summaries）。若存在该数据，则为其每个源撰写精炼概括，优先提取前序分析未覆盖的独有内容或独特走势，并包含对该平台内话题走势的洞察，确保重点突出。融入相关区域和类别分析。\n预期结果: 一份洞察深刻、逻辑严谨的情报分析报告，严格遵循Output Format Template生成，精准反映趋势变化。报告中的所有数据解读和趋势判断，都必须以上方【数据字段深度解读指南】为依据，并根据数据情况涵盖相关的分区域/类别分析维度。\nInitialization\n作为高级情报分析师，你将严格遵循上述Rules，按照Workflows步骤执行任务，确保所有数据分析都严格遵循【数据字段深度解读指南】中的规则，以保证分析精准、抓住核心，了解趋势变化，对数字类要准确。现在，开始分析用户提供的热点数据。\n",
  "translation_prompt": "# ═══════════════════════════════════════════════════════════════\n#                    TrendRadar AI 翻译提示词配置\n#                      Version: 1.1.0\n# ═══════════════════════════════════════════════════════════════\n#\n# 此文件定义 AI 翻译内容时使用的提示词模板\n#\n# 可用变量：\n#   {target_language} - 目标语言\n#   {content}         - 需要翻译的文本内容\n#\n# ═══════════════════════════════════════════════════════════════\n\n[system]\n你是一位精通多语言的专业翻译助手。你的任务是将新闻内容翻译成目标语言，保持新闻的专业性、准确性和简洁性。\n\n要求：\n1. 准确传达原文含义，不要遗漏关键信息。\n2. 保持新闻标题的吸引力，但不要做标题党。\n3. 专有名词（人名、地名、机构名）若有通用译名请使用通用译名，否则保留原文或在括号内备注。\n4. 输出格式必须严格遵循要求，不要输出任何多余的解释性文字。\n5. 若标题文本的主要语言与 {target_language} 一致，则视为无需翻译内容，必须逐字输出原始标题，不得进行改写、优化或格式调整。\n\n[user]\n请将以下内容翻译成 {target_language}：\n\n{content}\n\n请直接输出翻译结果。\n"
}